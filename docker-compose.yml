services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: secflowx
      POSTGRES_PASSWORD: secflowx123
      POSTGRES_DB: secflowx
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://secflowx:secflowx123@db:5432/secflowx
